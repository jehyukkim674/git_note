name: release

# v* 태그를 푸시하면 데스크톱(Mac/Win/Linux) 서명 빌드 + 안드로이드 APK를
# 만들어 GitHub Release에 올린다. 데스크톱은 tauri-plugin-updater의 latest.json을
# 생성해 자동 업데이트가, 안드로이드는 첨부된 .apk로 인앱 업데이트 안내가 동작한다.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS는 Apple Silicon(arm64)만 빌드. x86_64는 arm 러너에서
          # openssl 크로스 컴파일 문제가 있어 제외(Rosetta로 arm 빌드 실행 가능).
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        working-directory: app
        run: npm ci

      - name: Build & release (signed, with latest.json)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: "git_note ${{ github.ref_name }}"
          releaseBody: "데스크톱 자동 업데이트 + 안드로이드 APK 포함 릴리스."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  android:
    # 데스크톱 잡이 릴리스를 만든 뒤 같은 릴리스에 APK를 첨부한다.
    needs: desktop
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;26.1.10909125"
          NDK="$ANDROID_HOME/ndk/26.1.10909125"
          echo "NDK_HOME=$NDK" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$NDK" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$NDK" >> "$GITHUB_ENV"

      - name: Prepare NDK toolchain for vendored OpenSSL
        # NDK r26는 접두어 binutils(<triple>-ar/-ranlib)를 제거했으나
        # openssl-src(android)는 이를 호출한다. llvm-* 로 심볼릭 링크해 보충한다.
        run: |
          BIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "$BIN" >> "$GITHUB_PATH"
          for t in aarch64-linux-android armv7a-linux-androideabi arm-linux-androideabi i686-linux-android x86_64-linux-android; do
            ln -sf "$BIN/llvm-ar" "$BIN/${t}-ar"
            ln -sf "$BIN/llvm-ranlib" "$BIN/${t}-ranlib"
            ln -sf "$BIN/llvm-strip" "$BIN/${t}-strip"
            ln -sf "$BIN/llvm-nm" "$BIN/${t}-nm"
          done

      - name: Setup Rust (Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install frontend deps
        working-directory: app
        run: npm ci

      - name: Build APK (debug-signed, sideload 가능)
        working-directory: app
        # 실기기 아키텍처(arm64 + armv7)만 빌드. x86_64/i686(에뮬레이터)는
        # 벤더드 OpenSSL의 SM4 x86 어셈블리를 NDK clang이 인식하지 못해 제외.
        run: |
          npx tauri android init
          npx tauri android build --apk --debug --target aarch64 --target armv7

      - name: Upload APK to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APKS=$(find app/src-tauri/gen/android -name '*.apk')
          echo "APKs:"; echo "$APKS"
          gh release upload "${{ github.ref_name }}" $APKS --clobber
